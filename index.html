<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>QQ宠物</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 顶部状态栏 -->
    <div class="top-bar">
      <div class="coins-badge">
        <span class="coins-icon">💰</span>
        <span id="coinsDisplay">100</span>
      </div>
      <div class="pet-name-badge">
        <span id="petName">小花</span>
      </div>
      <div class="stage-badge">
        <span id="petStage">🐣 婴儿</span>
        <span class="exp-tag">Exp:<span id="expVal">0</span></span>
      </div>
    </div>

    <!-- ===== Tab页面容器 ===== -->

    <!-- 🏠 主页 Tab -->
    <div class="tab-page active" id="page-home">
      <!-- 房间场景 -->
      <div class="room time-day" id="room">
        <div id="roomDecorations">
          <div class="room-window">
            <div class="window-sky"></div>
            <div class="window-cloud" style="left:10%;animation-delay:0s"></div>
            <div class="window-cloud" style="left:50%;animation-delay:2s"></div>
          </div>
          <div class="room-shelf">
            <div class="book" style="background:#e57373;width:18px"></div>
            <div class="book" style="background:#64b5f6;width:24px"></div>
            <div class="book" style="background:#81c784;width:16px"></div>
          </div>
          <div class="floor-rug"></div>
        </div>

        <!-- 生病指示 -->
        <div class="sick-indicator" id="sickIndicator" style="display:none">🤒</div>

        <!-- 飘浮气泡 -->
        <div class="speech-bubble" id="speechBubble">
          <span id="speechText">喵～</span>
        </div>

        <!-- 宠物SVG主体 -->
        <div class="pet-container" id="petContainer">
          <svg id="petSvg" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
            <!-- 阴影 -->
            <ellipse cx="100" cy="210" rx="45" ry="8" fill="rgba(0,0,0,0.1)" id="shadow"/>

            <!-- 尾巴 -->
            <path id="tail" d="M 70 170 Q 30 155 35 130 Q 40 115 55 120"
                  fill="none" stroke="#FFAB91" stroke-width="10" stroke-linecap="round"/>

            <!-- 身体 -->
            <ellipse cx="100" cy="168" rx="48" ry="42" fill="#FFCCBC" id="body"/>
            <ellipse cx="100" cy="172" rx="28" ry="26" fill="#FFE0D0" id="belly"/>

            <!-- 服装图层 - 身体 -->
            <g id="clothingBody" style="display:none"></g>

            <!-- 头部 -->
            <circle cx="100" cy="110" r="52" fill="#FFCCBC" id="head"/>

            <!-- 耳朵 -->
            <polygon points="52,72 40,40 72,62" fill="#FFCCBC"/>
            <polygon points="55,75 44,44 74,65" fill="#FFAB91"/>
            <polygon points="148,72 160,40 128,62" fill="#FFCCBC"/>
            <polygon points="145,75 156,44 126,65" fill="#FFAB91"/>

            <!-- 服装图层 - 头部 -->
            <g id="clothingHead" style="display:none"></g>

            <!-- 眼睛 -->
            <g id="eyes">
              <circle cx="82" cy="106" r="11" fill="white"/>
              <circle cx="84" cy="107" r="7" fill="#5D4037"/>
              <circle cx="86" cy="104" r="2.5" fill="white"/>
              <circle cx="118" cy="106" r="11" fill="white"/>
              <circle cx="120" cy="107" r="7" fill="#5D4037"/>
              <circle cx="122" cy="104" r="2.5" fill="white"/>
            </g>
            <g id="sleepEyes" style="display:none">
              <path d="M 71 106 Q 82 99 93 106" fill="none" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
              <path d="M 107 106 Q 118 99 129 106" fill="none" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
            </g>
            <g id="happyEyes" style="display:none">
              <path d="M 71 110 Q 82 100 93 110" fill="none" stroke="#5D4037" stroke-width="3.5" stroke-linecap="round"/>
              <path d="M 107 110 Q 118 100 129 110" fill="none" stroke="#5D4037" stroke-width="3.5" stroke-linecap="round"/>
            </g>
            <g id="sadEyes" style="display:none">
              <circle cx="82" cy="109" r="11" fill="white"/>
              <circle cx="82" cy="111" r="7" fill="#5D4037"/>
              <circle cx="84" cy="108" r="2.5" fill="white"/>
              <circle cx="118" cy="109" r="11" fill="white"/>
              <circle cx="118" cy="111" r="7" fill="#5D4037"/>
              <circle cx="120" cy="108" r="2.5" fill="white"/>
              <ellipse cx="78" cy="122" rx="3" ry="5" fill="#90CAF9" opacity="0.8"/>
              <ellipse cx="114" cy="122" rx="3" ry="5" fill="#90CAF9" opacity="0.8"/>
            </g>

            <!-- 服装图层 - 配饰（眼镜等） -->
            <g id="clothingAcc" style="display:none"></g>

            <!-- 鼻子 -->
            <ellipse cx="100" cy="118" rx="5" ry="3.5" fill="#EF9A9A"/>

            <!-- 胡须 -->
            <line x1="55" y1="115" x2="88" y2="118" stroke="#BDBDBD" stroke-width="1.5" opacity="0.7"/>
            <line x1="55" y1="121" x2="88" y2="121" stroke="#BDBDBD" stroke-width="1.5" opacity="0.7"/>
            <line x1="112" y1="118" x2="145" y2="115" stroke="#BDBDBD" stroke-width="1.5" opacity="0.7"/>
            <line x1="112" y1="121" x2="145" y2="121" stroke="#BDBDBD" stroke-width="1.5" opacity="0.7"/>

            <!-- 嘴巴 -->
            <g id="mouth">
              <path d="M 93 124 Q 100 131 107 124" fill="none" stroke="#EF9A9A" stroke-width="2.5" stroke-linecap="round"/>
            </g>
            <g id="eatMouth" style="display:none">
              <ellipse cx="100" cy="127" rx="8" ry="6" fill="#C62828" opacity="0.8"/>
            </g>
            <g id="sadMouth" style="display:none">
              <path d="M 93 128 Q 100 123 107 128" fill="none" stroke="#EF9A9A" stroke-width="2.5" stroke-linecap="round"/>
            </g>

            <!-- 脸红 -->
            <ellipse cx="72" cy="120" rx="10" ry="6" fill="#FFCDD2" opacity="0" id="blushL"/>
            <ellipse cx="128" cy="120" rx="10" ry="6" fill="#FFCDD2" opacity="0" id="blushR"/>

            <!-- 爪子 -->
            <ellipse cx="63" cy="185" rx="18" ry="12" fill="#FFCCBC"/>
            <ellipse cx="137" cy="185" rx="18" ry="12" fill="#FFCCBC"/>

            <!-- 特效 -->
            <g id="hearts" style="display:none">
              <text x="145" y="80" font-size="18" class="heart-float">❤️</text>
              <text x="40" y="70" font-size="14" class="heart-float" style="animation-delay:0.5s">💕</text>
            </g>
            <g id="zzz" style="display:none">
              <text x="148" y="88" font-size="14" class="zzz-float">z</text>
              <text x="158" y="74" font-size="18" class="zzz-float" style="animation-delay:0.6s">z</text>
              <text x="170" y="58" font-size="22" class="zzz-float" style="animation-delay:1.2s">Z</text>
            </g>
            <text id="foodIcon" x="100" y="75" font-size="28" text-anchor="middle" style="display:none">🍖</text>
          </svg>
        </div>

        <!-- 地板物品 -->
        <div class="floor-items">
          <div class="item-bowl" title="食盆">🥣</div>
          <div class="item-ball" title="皮球">⚽</div>
        </div>
      </div>

      <!-- 5条属性条 -->
      <div class="stats-panel">
        <div class="stat-row">
          <span class="stat-label">🍎 饱食</span>
          <div class="stat-bar-bg"><div class="stat-bar hunger-bar" id="hungerBar"></div></div>
          <span class="stat-num" id="hungerNum">80</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">😊 快乐</span>
          <div class="stat-bar-bg"><div class="stat-bar happy-bar" id="happyBar"></div></div>
          <span class="stat-num" id="happyNum">80</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">⚡ 体力</span>
          <div class="stat-bar-bg"><div class="stat-bar energy-bar" id="energyBar"></div></div>
          <span class="stat-num" id="energyNum">80</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">💧 清洁</span>
          <div class="stat-bar-bg"><div class="stat-bar clean-bar" id="cleanBar"></div></div>
          <span class="stat-num" id="cleanNum">80</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">❤️ 健康</span>
          <div class="stat-bar-bg"><div class="stat-bar health-bar" id="healthBar"></div></div>
          <span class="stat-num" id="healthNum">100</span>
        </div>
      </div>

      <!-- 快捷操作按钮 -->
      <div class="action-panel">
        <button class="action-btn feed-btn" onclick="App.feed()">
          <span class="btn-icon">🍖</span>
          <span class="btn-label">喂食</span>
        </button>
        <button class="action-btn play-btn" onclick="App.play()">
          <span class="btn-icon">🎮</span>
          <span class="btn-label">玩耍</span>
        </button>
        <button class="action-btn sleep-btn" onclick="App.sleep()">
          <span class="btn-icon">💤</span>
          <span class="btn-label">睡觉</span>
        </button>
        <button class="action-btn bath-btn" onclick="App.bath()">
          <span class="btn-icon">🛁</span>
          <span class="btn-label">洗澡</span>
        </button>
      </div>
    </div>

    <!-- 🎮 游戏 Tab -->
    <div class="tab-page" id="page-games">
      <div class="page-content">
        <div class="page-header">🎮 迷你游戏</div>
        <div class="games-list">
          <div class="game-card" onclick="GamesUI.startRPS()">
            <div class="game-card-icon">✊</div>
            <div class="game-card-info">
              <div class="game-card-name">猜拳游戏</div>
              <div class="game-card-desc">石头剪刀布！赢一局+5Q币</div>
            </div>
          </div>
          <div class="game-card" onclick="GamesUI.startMath()">
            <div class="game-card-icon">🔢</div>
            <div class="game-card-info">
              <div class="game-card-name">算术挑战</div>
              <div class="game-card-desc">30秒内答对尽量多题，每题+3Q币</div>
            </div>
          </div>
          <div class="game-card" onclick="GamesUI.startStars()">
            <div class="game-card-icon">⭐</div>
            <div class="game-card-info">
              <div class="game-card-name">接星星</div>
              <div class="game-card-desc">点击掉落的星星，每颗+2Q币</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 🏪 商店 Tab -->
    <div class="tab-page" id="page-shop">
      <div class="page-content" id="shopPageContent">
        <div class="page-header">🏪 商店 <span class="header-coins">💰 <span id="shopCoins">100</span></span></div>
        <div class="shop-tabs" id="shopTabs"></div>
        <div class="shop-grid" id="shopGrid"></div>
      </div>
    </div>

    <!-- 📋 更多 Tab -->
    <div class="tab-page" id="page-more">
      <div class="page-content">
        <div class="page-header">📋 更多功能</div>
        <div class="more-grid">
          <div class="more-card" onclick="App.openSchool()"><span class="more-card-icon">🏫</span><span>学校</span></div>
          <div class="more-card" onclick="App.openWork()"><span class="more-card-icon">💼</span><span>打工</span></div>
          <div class="more-card" onclick="BagUI.open()"><span class="more-card-icon">🎒</span><span>背包</span></div>
          <div class="more-card" onclick="ClothingUI.open()"><span class="more-card-icon">👗</span><span>换装</span></div>
          <div class="more-card" onclick="App.openHospital()"><span class="more-card-icon">🏥</span><span>医院</span></div>
          <div class="more-card" onclick="App.openDaily()"><span class="more-card-icon">📅</span><span>签到</span></div>
          <div class="more-card" onclick="App.openAchievements()"><span class="more-card-icon">🏆</span><span>成就</span></div>
          <div class="more-card" onclick="App.openDiary()"><span class="more-card-icon">📔</span><span>日记</span></div>
          <div class="more-card" onclick="App.openSettings()"><span class="more-card-icon">⚙️</span><span>设置</span></div>
        </div>
      </div>
    </div>

    <!-- 底部Tab导航 -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="home" onclick="App.switchTab('home')">
        <span class="tab-icon">🏠</span>
        <span class="tab-label">家</span>
      </button>
      <button class="tab-btn" data-tab="games" onclick="App.switchTab('games')">
        <span class="tab-icon">🎮</span>
        <span class="tab-label">游戏</span>
      </button>
      <button class="tab-btn" data-tab="shop" onclick="App.switchTab('shop'); ShopPageUI.refresh()">
        <span class="tab-icon">🏪</span>
        <span class="tab-label">商店</span>
      </button>
      <button class="tab-btn" data-tab="more" onclick="App.switchTab('more')">
        <span class="tab-icon">📋</span>
        <span class="tab-label">更多</span>
      </button>
    </div>
  </div>

  <!-- Scripts: data -->
  <script src="js/data/items.js"></script>
  <script src="js/data/courses.js"></script>
  <script src="js/data/jobs.js"></script>
  <script src="js/data/achievements.js"></script>
  <script src="js/data/diseases.js"></script>

  <!-- Scripts: core -->
  <script src="js/core/save.js"></script>
  <script src="js/core/pet.js"></script>
  <script src="js/core/economy.js"></script>
  <script src="js/core/inventory.js"></script>

  <!-- Scripts: systems -->
  <script src="js/systems/diary.js"></script>
  <script src="js/systems/daily.js"></script>
  <script src="js/systems/school.js"></script>
  <script src="js/systems/work.js"></script>
  <script src="js/systems/hospital.js"></script>
  <script src="js/systems/achievement.js"></script>

  <!-- Scripts: ui -->
  <script src="js/ui/sound.js"></script>
  <script src="js/ui/panels.js"></script>
  <script src="js/ui/shop.js"></script>
  <script src="js/ui/bag.js"></script>
  <script src="js/ui/scenes.js"></script>
  <script src="js/ui/clothing.js"></script>
  <script src="js/ui/games.js"></script>
  <script src="js/ui/app.js"></script>

  <!-- Inline: Shop page (embedded tab, not popup) -->
  <script>
    const ShopPageUI = {
      _cat: 'food',
      refresh() {
        const shopCoins = document.getElementById('shopCoins');
        if (shopCoins) shopCoins.textContent = App.getGameState().coins;

        const tabs = document.getElementById('shopTabs');
        const grid = document.getElementById('shopGrid');
        if (!tabs || !grid) return;

        let tabsHtml = '';
        for (const [key, cat] of Object.entries(ITEM_CATEGORIES)) {
          tabsHtml += `<button class="shop-tab ${key === this._cat ? 'active' : ''}" onclick="ShopPageUI.switchCat('${key}')">${cat.icon} ${cat.name}</button>`;
        }
        tabs.innerHTML = tabsHtml;

        const items = ITEM_CATEGORIES[this._cat].items;
        let gridHtml = '';
        for (const item of items) {
          const canBuy = Economy.canAfford(item.price);
          gridHtml += `
            <div class="shop-item ${canBuy ? '' : 'shop-item-disabled'}">
              <div class="shop-item-name">${item.name}</div>
              <div class="shop-item-desc">${item.desc}</div>
              <div class="shop-item-footer">
                <span class="shop-item-price">💰${item.price}</span>
                <button class="btn btn-sm btn-primary" ${canBuy ? '' : 'disabled'} onclick="ShopPageUI.buy('${item.id}')">购买</button>
              </div>
            </div>
          `;
        }
        grid.innerHTML = gridHtml;
      },
      switchCat(cat) {
        this._cat = cat;
        this.refresh();
      },
      buy(itemId) {
        const result = Inventory.buy(itemId);
        if (result.ok) {
          Panels.toast(result.msg);
          if (typeof AchievementSystem !== 'undefined') {
            const ach = AchievementSystem.checkAll();
            ach.forEach(a => Panels.toast('🏆 ' + a.name));
          }
        } else {
          Panels.toast(result.msg);
        }
        App.saveGame();
        App.updateCoinsDisplay();
        this.refresh();
      }
    };
  </script>

  <!-- Entry point -->
  <script src="js/main.js"></script>
</body>
</html>
